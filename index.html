<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLA MUNDO!!!</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app-container">
        <header>
            <h1>GeoVision 2026</h1>
        </header>

        <main>
            <section id="map-container">
                <div id="map" style="height: 100%; width: 100%;"></div>
            </section>

            <aside id="sidebar">
                <h2>Panel de Control</h2>
                <button id="btn-localizar">Mi Ubicación</button>
                <div id="info-coords">Esperando señal GPS...</div>
                <h3>Historial de Puntos</h3>
                <hr>
                <h3>Foto Drone</h3>
                <input type="file" id="input-drone" accept="image/*" style="display: none;">
                <button id="btn-subir-foto" style="background-color: #f39c12;">Subir Foto de Drone</button>
                <div id="telemetria-drone" style="margin-top: 10px; font-size: 0.8em; color: #f1c40f;"></div>
                <ul id="lista-puntos" style="list-style: none; padding: 0; color: #ccc;">
                </ul>
            </aside>
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
