<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVision 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app-container">
        <header>
            <h1>GeoVision 2026</h1>
        </header>

        <main>
            <section id="map-container">
                <div id="map"></div>
            </section>

            <aside id="sidebar">
                <h2>Panel de Control</h2>

                <button id="btn-localizar">Mi Ubicación</button>
                <button id="btn-clima-actual" style="background-color: #2980b9; width: 100%; margin-top: 5px;">🌦️ Clima
                    en mi posición</button>
                <div id="info-clima-actual" style="margin-top: 10px; font-size: 0.8em; color: #ecf0f1;"></div>
                <div id="info-coords">Esperando señal GPS...</div>

                <hr>

                <h3>Foto Drone</h3>
                <input type="file" id="input-drone" accept="image/*" style="display: none;">
                <button id="btn-subir-foto" style="background-color: #f39c12;">Subir Foto de Drone</button>
                <div id="telemetria-drone" style="margin-top: 10px; font-size: 0.8em; color: #f1c40f;"></div>

                <button id="btn-clima"
                    style="background-color: #34495e; width: 100%; margin-top: 5px; display: none;">🌦️ Ver Clima del
                    Vuelo</button>
                <div id="info-clima" style="margin-top: 10px; font-size: 0.8em; color: #ecf0f1;"></div>

                <hr>

                <h3>Calculador de Objetivo (Mira)</h3>
                <div id="panel-mira" style="background: #333; padding: 10px; border-radius: 5px; font-size: 0.8em;">
                    <p>Ángulo Gimbal (Pitch): <input type="number" id="gimbal-pitch" value="45" style="width: 50px;"> °
                    </p>
                    <p>Rumbo (Heading): <input type="number" id="drone-heading" value="0" style="width: 50px;"> °</p>
                    <p>Altitud de Vuelo: <input type="number" id="manual-alt" value="100" style="width: 50px;"> mts</p>
                    <button id="btn-proyectar" style="background-color: #e74c3c; width: 100%;">Calcular Punto
                        Objetivo</button>
                    <div id="resultado-mira" style="margin-top:10px; color: #f1c40f;"></div>
                </div>

                <hr>

                <div id="panel-medicion-total"
                    style="margin-top: 15px; padding: 10px; background: #222; border-radius: 8px; border: 1px solid #444;">
                    <h4 style="margin-top: 0; color: #3498db;">📐 Herramientas de Medición</h4>

                    <div style="display: flex; gap: 5px;">
                        <button id="btn-regla" style="flex: 1; background-color: #3498db; font-size: 0.8em;">📏 Nueva
                            Línea</button>
                        <button id="btn-poligono" style="flex: 1; background-color: #27ae60; font-size: 0.8em;">📐 Nuevo
                            Área</button>
                    </div>

                    <button id="btn-borrar-todo"
                        style="width: 100%; background-color: #c0392b; margin-top:5px; padding: 5px; font-size: 0.8em;">Borrar
                        Todo el Mapa</button>

                    <div style="margin-top: 15px;">
                        <small style="color: #3498db; font-weight: bold;">Líneas (Distancias):</small>
                        <ul id="lista-medidas"
                            style="list-style: none; padding: 0; margin-top:5px; max-height: 120px; overflow-y: auto;">
                        </ul>
                    </div>

                    <div style="margin-top: 15px;">
                        <small style="color: #27ae60; font-weight: bold;">Polígonos (Áreas):</small>
                        <ul id="lista-poligonos"
                            style="list-style: none; padding: 0; margin-top:5px; max-height: 120px; overflow-y: auto;">
                        </ul>
                    </div>
                </div>

                <hr>

                <div id="panel-puntos"
                    style="margin-top: 15px; padding: 10px; background: #222; border-radius: 8px; border: 1px solid #444;">
                    <h4 style="margin-top: 0; color: #27ae60;">📍 Puntos de Interés</h4>
                    <button id="btn-modo-punto"
                        style="width: 100%; padding: 8px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px;">
                        📍 Marcador Manual: Desactivado
                    </button>
                    <div id="historial-puntos" style="max-height: 150px; overflow-y: auto;">
                        <ul id="lista-puntos" style="list-style: none; padding: 0; font-size: 0.85em; color: white;">
                        </ul>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/geometria.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <script src="js/script.js"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Servicio Offline Activo"))
                .catch(err => console.log("Error de registro", err));
        }
    </script>
</body>

</html>
