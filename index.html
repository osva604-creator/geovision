<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOYI_MAPS 2.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app-container">
        <header>
            <h1>GeoVision 2026</h1>
        </header>

        <main>
            <section id="map-container">
                <div id="map" style="height: 100%; width: 100%;"></div>
            </section>

            <aside id="sidebar">
                <h2>Panel de Control</h2>
                <button id="btn-localizar">Mi Ubicación</button>
                <div id="info-coords">Esperando señal GPS...</div>
                <h3>Historial de Puntos</h3>
                <hr>
                <h3>Foto Drone</h3>
                <input type="file" id="input-drone" accept="image/*" style="display: none;">
                <button id="btn-subir-foto" style="background-color: #f39c12;">Subir Foto de Drone</button>
                <div id="telemetria-drone" style="margin-top: 10px; font-size: 0.8em; color: #f1c40f;"></div>
                <ul id="lista-puntos" style="list-style: none; padding: 0; color: #ccc;">
                </ul>
                <hr>
                <h3>Calculador de Objetivo (Mira)</h3>
                <div id="panel-herramientas"
                    style="margin-top: 15px; padding: 10px; background: #222; border-radius: 8px; border: 1px solid #444;">
                    <h4 style="margin-top: 0; color: #3498db;">📏 MEDIR</h4>
                    <button id="btn-regla"
                        style="width: 100%; padding: 8px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">
                        Medir Distancia
                    </button>
                    <div id="resultado-regla" style="margin-top: 10px; font-weight: bold; color: #2ecc71;"></div>
                    <small style="color: #aaa; font-size: 0.8em;">* Haz clic en dos puntos del mapa para medir.</small>
                </div>
            </aside>
        </main>
        <hr>
        <h3>Calculador de Objetivo (Mira)</h3>
        <div id="panel-mira" style="background: #333; padding: 10px; border-radius: 5px; font-size: 0.8em;">
            <p>Ángulo Gimbal (Pitch): <input type="number" id="gimbal-pitch" value="45" style="width: 50px;"> °</p>
            <p>Rumbo (Heading): <input type="number" id="drone-heading" value="0" style="width: 50px;"> °</p>
            <p>Altitud de Vuelo: <input type="number" id="manual-alt" value="100" style="width: 50px;"> mts</p>

            <button id="btn-proyectar" style="background-color: #e74c3c;">Calcular Punto Objetivo</button>
        </div>
        <div id="resultado-mira" style="margin-top:10px; color: #f1c40f;"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="js/script.js"></script>
</body>

</html>
